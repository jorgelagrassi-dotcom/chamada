<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Aluno</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<script src="menu.js"></script>

<div class="container">
<h1>Cadastro de Aluno</h1>

<h3>Foto do aluno</h3>
<input type="file" id="foto" accept="image/*">

<br><br>

<input id="nome" placeholder="Nome do aluno">

<input id="ra" placeholder="RA">

<h3>Série</h3>

<select id="serieNumero">
<option value="">Ano</option>
<option value="6">6°</option>
<option value="7">7°</option>
<option value="8">8°</option>
<option value="9">9°</option>
<option value="1">1° Médio</option>
<option value="2">2° Médio</option>
<option value="3">3° Médio</option>
</select>

<select id="serieLetra">
<option value="">Turma</option>
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>E</option>
</select>

<h3>Responsáveis</h3>

<input id="resp1" placeholder="Responsável 1">
<input id="tel1" placeholder="Telefone" oninput="mascaraTelefone(this)">

<input id="resp2" placeholder="Responsável 2">
<input id="tel2" placeholder="Telefone" oninput="mascaraTelefone(this)">



<h3>Observações</h3>

<textarea id="obs" placeholder="Observações"></textarea>

<br><br>

<button onclick="salvarAluno()" class="btn-entrar">
    Salvar aluno
    </button>
    
    </div>
    
    <script type="module" src="firebase.js"></script>
    
    <script>
    
    /* ===== CONTROLE DE PERMISSÃO ===== */
    
    const modo = localStorage.getItem("modo");
    
    if(modo !== "admin"){
    alert("Apenas administradores podem cadastrar alunos");
    window.location = "pesquisa.html";
    }
    

/* ===== MÁSCARA TELEFONE ===== */

function mascaraTelefone(input){

let valor = input.value.replace(/\D/g,'');

if(valor.length > 11){
valor = valor.slice(0,11);
}

valor = valor.replace(/^(\d{2})(\d)/g,"($1) $2");

valor = valor.replace(/(\d{5})(\d)/,"$1-$2");

input.value = valor;

}

/* ===== SALVAR ALUNO ===== */

function salvarAluno(){

const arquivo = document.getElementById("foto").files[0];

if(!arquivo){
alert("Selecione uma foto");
return;
}

const leitor = new FileReader();

leitor.onload = function(event){

const img = new Image();
img.src = event.target.result;

img.onload = function(){

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

const larguraMax = 600;

let largura = img.width;
let altura = img.height;

if(largura > larguraMax){
altura = altura * (larguraMax / largura);
largura = larguraMax;
}

canvas.width = largura;
canvas.height = altura;

ctx.drawImage(img,0,0,largura,altura);

const fotoBase64 = canvas.toDataURL("image/jpeg",0.7);

const dados = {

nome: document.getElementById("nome").value,
ra: document.getElementById("ra").value,

serieNumero: document.getElementById("serieNumero").value,
serieLetra: document.getElementById("serieLetra").value,

resp1: document.getElementById("resp1").value,
tel1: document.getElementById("tel1").value,

resp2: document.getElementById("resp2").value,
tel2: document.getElementById("tel2").value,

resp3: document.getElementById("resp3").value,
tel3: document.getElementById("tel3").value,

resp4: document.getElementById("resp4").value,
tel4: document.getElementById("tel4").value,

observacoes: document.getElementById("obs").value,

foto: fotoBase64

};

window.cadastrarAluno(dados);

}

}

leitor.readAsDataURL(arquivo);

}

</script>

<div class="credito">By Jorge La Grassi</div>

</body>
</html>
