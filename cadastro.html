<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Aluno</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<script src="menu.js"></script>

<div class="container">

<h1>Cadastro de Aluno</h1>

<h3>Foto do aluno</h3>
<input type="file" id="foto" accept="image/*">

<br><br>

<input id="nome" placeholder="Nome do aluno">
<input id="ra" placeholder="RA">

<h3>Data de aniversário</h3>
<input type="date" id="aniversario">

<h3>Série</h3>

<select id="serieNumero">
<option value="">Ano</option>
<option value="6">6º Ano</option>
<option value="7">7º Ano</option>
<option value="8">8º Ano</option>
<option value="9">9º Ano</option>
<option value="1">1º Médio</option>
<option value="2">2º Médio</option>
<option value="3">3º Médio</option>
</select>

<select id="serieLetra">
<option value="">Turma</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
</select>

<h3>Responsáveis</h3>

<input id="resp1" placeholder="Responsável 1">
<input id="tel1" placeholder="Telefone" oninput="mascaraTelefone(this)">

<input id="resp2" placeholder="Responsável 2">
<input id="tel2" placeholder="Telefone" oninput="mascaraTelefone(this)">

<h3>Observações</h3>

<textarea id="obs" placeholder="Observações"></textarea>

<br><br>

<button onclick="salvarAluno()" class="btn-entrar">
Salvar aluno
</button>

</div>

<!-- 🔥 SCRIPT DO FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAKFNE4ZOrrvM4PGf_72CcUxSkfPs-0cQk",
authDomain: "alunos-escola-35433.firebaseapp.com",
projectId: "alunos-escola-35433",
storageBucket: "alunos-escola-35433.firebasestorage.app",
messagingSenderId: "682522156619",
appId: "1:682522156619:web:7f0be7ecd5edbf1819f7ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const modo = localStorage.getItem("modo");

/* =========================
SALVAR ALUNO
========================= */

window.salvarAluno = async function(){

if(modo !== "admin"){
alert("Apenas administradores podem cadastrar alunos");
return;
}

const arquivo = document.getElementById("foto").files[0];

const dadosBase = {

nome: document.getElementById("nome").value.toUpperCase(),
ra: document.getElementById("ra").value.toUpperCase(),
aniversario: document.getElementById("aniversario").value,

serieNumero: document.getElementById("serieNumero").value,
serieLetra: document.getElementById("serieLetra").value,

resp1: document.getElementById("resp1").value.toUpperCase(),
tel1: document.getElementById("tel1").value,

resp2: document.getElementById("resp2").value.toUpperCase(),
tel2: document.getElementById("tel2").value,

observacoes: document.getElementById("obs").value.toUpperCase()

};

/* SEM FOTO */
if(!arquivo){
await addDoc(collection(db,"alunos"),dadosBase);
alert("Aluno cadastrado com sucesso");
window.location = "pesquisa.html";
return;
}

/* COM FOTO */
const leitor = new FileReader();

leitor.onload = function(event){

const img = new Image();
img.src = event.target.result;

img.onload = async function(){

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

const larguraMax = 600;

let largura = img.width;
let altura = img.height;

if(largura > larguraMax){
altura = altura * (larguraMax / largura);
largura = larguraMax;
}

canvas.width = largura;
canvas.height = altura;

ctx.drawImage(img,0,0,largura,altura);

const fotoBase64 = canvas.toDataURL("image/jpeg",0.7);

await addDoc(collection(db,"alunos"),{
...dadosBase,
foto: fotoBase64
});

alert("Aluno cadastrado com sucesso");
window.location = "pesquisa.html";

}

}

leitor.readAsDataURL(arquivo);

}

</script>

<!-- 🔥 SCRIPT GLOBAL (RESOLVE A MÁSCARA) -->
<script>

function mascaraTelefone(input){

let valor = input.value.replace(/\D/g,'');

if(valor.length > 11){
valor = valor.slice(0,11);
}

valor = valor.replace(/^(\d{2})(\d)/g,"($1) $2");
valor = valor.replace(/(\d{5})(\d)/,"$1-$2");

input.value = valor;

}

</script>

<div class="credito">By Jorge La Grassi</div>

</body>
</html>
