<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório de Presença</title>

<link rel="stylesheet" href="style.css">

<style>

.tabela{
width:100%;
border-collapse:collapse;
margin-top:4px;
font-size:10px;
}

.tabela th,
.tabela td{
border:1px solid #d1d5db;
padding:2px;
text-align:center;
}

.tabela th{
background:#f1f5f9;
}

.nomeAluno{
text-align:left;
font-weight:bold;
font-size:10px;
}

.presente{
color:#15803d;
font-weight:bold;
}

.falta{
color:#b91c1c;
font-weight:bold;
}

#cabecalhoImpressao{
display:none;
text-align:center;
margin-bottom:6px;
line-height:1.2;
}

#cabecalhoImpressao h2{
margin:0;
font-size:14px;
}

#cabecalhoImpressao b{
font-size:11px;
}

@media print{

@page{
size: landscape;
margin:6mm;
}

.navbar,
button,
select,
input,
h3,
label{
display:none;
}

h1{
display:none;
}

#cabecalhoImpressao{
display:block;
}

.container{
width:100%;
margin:0;
padding:2px;
box-shadow:none;
}

.tabela{
font-size:9px;
}

.tabela th,
.tabela td{
padding:2px;
}

.nomeAluno{
font-size:9px;
}

table{
page-break-inside:auto;
}

tr{
page-break-inside:avoid;
}

.credito{
font-size:8px;
margin-top:6px;
}

}

</style>

</head>

<body>

<script src="menu.js"></script>

<div class="container">

<h1>Relatório de Presença</h1>

<h3>Série</h3>

<select id="serieNumero">
<option value="">Todas</option>
<option value="6">6º Ano</option>
<option value="7">7º Ano</option>
<option value="8">8º Ano</option>
<option value="9">9º Ano</option>
<option value="1">1º Médio</option>
<option value="2">2º Médio</option>
<option value="3">3º Médio</option>
</select>

<select id="serieLetra">
<option value="">Turma</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
</select>

<br><br>

<h3>Período</h3>

<label>Data início</label>
<input type="date" id="dataInicio">

<label>Data fim</label>
<input type="date" id="dataFim">

<br><br>

<button onclick="gerarRelatorio()" class="btn-entrar">
Gerar relatório
</button>

<button onclick="window.print()" class="btn-entrar">
Imprimir
</button>

<div id="cabecalhoImpressao"></div>
<div id="tabelaRelatorio"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAKFNE4ZOrrvM4PGf_72CcUxSkfPs-0cQk",
authDomain: "alunos-escola-35433.firebaseapp.com",
projectId: "alunos-escola-35433",
storageBucket: "alunos-escola-35433.firebasestorage.app",
messagingSenderId: "682522156619",
appId: "1:682522156619:web:7f0be7ecd5edbf1819f7ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.gerarRelatorio = async function(){

const inicio = document.getElementById("dataInicio").value;
const fim = document.getElementById("dataFim").value;
const serieNumero = document.getElementById("serieNumero").value;
const serieLetra = document.getElementById("serieLetra").value;

if(!inicio || !fim){
alert("Selecione o período");
return;
}

/* FILTRO FIREBASE (CORRIGIDO) */

let q = query(
collection(db,"presencas"),
where("data",">=",inicio),
where("data","<=",fim)
);

if(serieNumero){
q = query(q, where("serieNumero","==",serieNumero));
}

if(serieLetra){
q = query(q, where("serieLetra","==",serieLetra));
}

const presencasSnap = await getDocs(q);
const alunosSnap = await getDocs(collection(db,"alunos"));

let alunos = {};

alunosSnap.forEach((doc)=>{
const a = doc.data();

if(serieNumero && a.serieNumero != serieNumero) return;
if(serieLetra && a.serieLetra != serieLetra) return;

alunos[doc.id] = {
nome:a.nome,
presencas:{}
};

});

/* DATAS SEM FIM DE SEMANA */

let datas = [];

let dataAtual = new Date(inicio);
let dataFinal = new Date(fim);

while(dataAtual <= dataFinal){

let diaSemana = dataAtual.getDay();

if(diaSemana !== 0 && diaSemana !== 6){

let ano = dataAtual.getFullYear();
let mes = String(dataAtual.getMonth()+1).padStart(2,'0');
let dia = String(dataAtual.getDate()).padStart(2,'0');

datas.push(`${ano}-${mes}-${dia}`);

}

dataAtual.setDate(dataAtual.getDate()+1);

}

/* PRESENÇAS */

presencasSnap.forEach((doc)=>{
const p = doc.data();

if(alunos[p.alunoId]){
alunos[p.alunoId].presencas[p.data] = p.status;
}
});

/* CABEÇALHO */

let serieTexto = "Todas";

if(serieNumero){
serieTexto = serieNumero + "° " + (serieLetra || "");
}

document.getElementById("cabecalhoImpressao").innerHTML = `
<h2>Relatório de Presença</h2>
<b>Série:</b> ${serieTexto}<br>
<b>Período:</b> ${inicio} até ${fim}
<hr>
`;

/* TABELA */

let html = `<table class="tabela">`;

html += `<tr><th>Aluno</th>`;

datas.forEach(d=>{
html += `<th>${d.split("-")[2]}</th>`;
});

html += `<th>%</th></tr>`;

Object.values(alunos).forEach(aluno=>{

let faltas = 0;
let total = datas.length;

html += `<tr>`;
html += `<td class="nomeAluno">${aluno.nome}</td>`;

datas.forEach(d=>{
let status = aluno.presencas[d];

if(status === "falta"){
faltas++;
html += `<td class="falta">F</td>`;
}else if(status === "justificado"){
html += `<td class="presente">PJ</td>`;
}else{
html += `<td class="presente">P</td>`;
}
});

let presenca = total > 0 ? ((total - faltas) / total * 100).toFixed(0) : 0;

html += `<td>${presenca}%</td>`;
html += `</tr>`;

});

html += `</table>`;

document.getElementById("tabelaRelatorio").innerHTML = html;

}

</script>

<div class="credito">By Jorge La Grassi</div>

</body>
</html>
