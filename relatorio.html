<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório de Presença</title>

<link rel="stylesheet" href="style.css">

<style>

    .tabela{
    width:100%;
    border-collapse:collapse;
    margin-top:4px;
    font-size:10px;
    }
    
    .tabela th,
    .tabela td{
    border:1px solid #d1d5db;
    padding:2px;
    text-align:center;
    }
    
    .tabela th{
    background:#f1f5f9;
    }
    
    .nomeAluno{
    text-align:left;
    font-weight:bold;
    font-size:10px;
    }
    
    .presente{
    color:#15803d;
    font-weight:bold;
    }
    
    .falta{
    color:#b91c1c;
    font-weight:bold;
    }
    
    /* CABEÇALHO DO RELATÓRIO */
    
    #cabecalhoImpressao{
    display:none;
    text-align:center;
    margin-bottom:6px;
    line-height:1.2;
    }
    
    #cabecalhoImpressao h2{
    margin:0;
    font-size:14px;
    }
    
    #cabecalhoImpressao b{
    font-size:11px;
    }
    
    /* IMPRESSÃO */
    
    @media print{
    
    @page{
    size: landscape;
    margin:6mm;
    }
    
    /* esconder elementos da tela */
    
    .navbar,
    button,
    select,
    input,
    h3,
    label{
    display:none;
    }
    
    /* esconder título da página */
    
    h1{
    display:none;
    }
    
    /* mostrar cabeçalho do relatório */
    
    #cabecalhoImpressao{
    display:block;
    }
    
    /* container ocupa folha */
    
    .container{
    width:100%;
    margin:0;
    padding:2px;
    box-shadow:none;
    }
    
    /* tabela compacta */
    
    .tabela{
    font-size:9px;
    }
    
    .tabela th,
    .tabela td{
    padding:2px;
    }
    
    .nomeAluno{
    font-size:9px;
    }
    
    /* evitar quebra de aluno */
    
    table{
    page-break-inside:auto;
    }
    
    tr{
    page-break-inside:avoid;
    }
    
    .credito{
    font-size:8px;
    margin-top:6px;
    }
    
    }
    
    </style>

</head>

<body>

<script src="menu.js"></script>

<div class="container">

<h1>Relatório de Presença</h1>

<h3>Série</h3>

<select id="serieNumero">

    <option value="">Todas</option>
    
    <option value="6">6º Ano</option>
    <option value="7">7º Ano</option>
    <option value="8">8º Ano</option>
    <option value="9">9º Ano</option>
    
    <option value="1">1º Médio</option>
    <option value="2">2º Médio</option>
    <option value="3">3º Médio</option>
    
    </select>
    
    <select id="serieLetra">
    
    <option value="">Turma</option>
    
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="E">E</option>
</select>
<br><br>

<h3>Período</h3>

<label>Data início</label>
<input type="date" id="dataInicio">

<label>Data fim</label>
<input type="date" id="dataFim">

<br><br>

<button onclick="gerarRelatorio()" class="btn-entrar">
Gerar relatório
</button>

<button onclick="window.print()" class="btn-entrar">
Imprimir
</button>

<div id="cabecalhoImpressao"></div>

<div id="tabelaRelatorio"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAKFNE4ZOrrvM4PGf_72CcUxSkfPs-0cQk",
authDomain: "alunos-escola-35433.firebaseapp.com",
projectId: "alunos-escola-35433",
storageBucket: "alunos-escola-35433.firebasestorage.app",
messagingSenderId: "682522156619",
appId: "1:682522156619:web:7f0be7ecd5edbf1819f7ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.gerarRelatorio = async function(){

const inicio = document.getElementById("dataInicio").value;
const fim = document.getElementById("dataFim").value;

const serieNumero = document.getElementById("serieNumero").value;
const serieLetra = document.getElementById("serieLetra").value;

if(!inicio || !fim){
alert("Selecione o período");
return;
}

const presencasSnap = await getDocs(collection(db,"presencas"));
const alunosSnap = await getDocs(collection(db,"alunos"));

let alunos = {};

alunosSnap.forEach((doc)=>{

const a = doc.data();

if(serieNumero && a.serieNumero != serieNumero) return;
if(serieLetra && a.serieLetra != serieLetra) return;

alunos[doc.id] = {
nome:a.nome,
presencas:{}
};

});

let datas = [];

/* CORREÇÃO DO ERRO DO DIA 28 */

let partesInicio = inicio.split("-");
let partesFim = fim.split("-");

let dataAtual = new Date(partesInicio[0], partesInicio[1]-1, partesInicio[2]);
let dataFinal = new Date(partesFim[0], partesFim[1]-1, partesFim[2]);

while(dataAtual <= dataFinal){

let ano = dataAtual.getFullYear();
let mes = String(dataAtual.getMonth()+1).padStart(2,'0');
let dia = String(dataAtual.getDate()).padStart(2,'0');

let d = `${ano}-${mes}-${dia}`;

datas.push(d);

dataAtual.setDate(dataAtual.getDate()+1);

}

/* PRESENÇAS */

presencasSnap.forEach((doc)=>{

const p = doc.data();

if(p.data >= inicio && p.data <= fim){

if(alunos[p.alunoId]){

alunos[p.alunoId].presencas[p.data] = p.status;

}

}

});

/* CABEÇALHO PARA IMPRESSÃO */

let serieTexto = "Todas";

if(serieNumero){
serieTexto = serieNumero + "° " + (serieLetra || "");
}

document.getElementById("cabecalhoImpressao").innerHTML = `
<h2>Relatório de Presença</h2>
<b>Série:</b> ${serieTexto}<br>
<b>Período:</b> ${inicio} até ${fim}
<hr>
`;

/* TABELA */

let html = `<table class="tabela">`;

html += `<tr>
<th>Aluno</th>`;

datas.forEach(d=>{

const dia = d.split("-")[2];

html += `<th>${dia}</th>`;

});

html += `<th>%</th>`;

html += `</tr>`;

Object.values(alunos).forEach(aluno=>{

let faltas = 0;
let total = datas.length;

html += `<tr>`;

html += `<td class="nomeAluno">${aluno.nome}</td>`;

datas.forEach(d=>{

let status = aluno.presencas[d];

if(status === "falta"){

faltas++;

html += `<td class="falta">F</td>`;

}else{

html += `<td class="presente">P</td>`;

}

});

let presenca = ((total - faltas) / total * 100).toFixed(0);

html += `<td>${presenca}%</td>`;

html += `</tr>`;

});

html += `</table>`;

document.getElementById("tabelaRelatorio").innerHTML = html;

}

</script>

<div class="credito">By Jorge La Grassi</div>

</body>
</html>
